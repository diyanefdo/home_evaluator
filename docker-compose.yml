services:
  home-evaluator:
    build: .
    image: home-evaluator
    container_name: home-evaluator
    ports:
      - "8000:8000"          # host:container — see WSL note in knowledge/DOCKER_PRIVATE_DEPLOYMENT.md
    environment:
      # Set these in a local .env file (gitignored) to require login on a public link.
      # EVALUATOR_AUTH toggles login: on/off, or leave empty for "auto"
      #   (auto = login is ON whenever EVALUATOR_PASSWORD is set, OFF otherwise).
      - EVALUATOR_AUTH=${EVALUATOR_AUTH:-}
      - EVALUATOR_USER=${EVALUATOR_USER:-admin}
      - EVALUATOR_PASSWORD=${EVALUATOR_PASSWORD:-}
      # Live 5yr mortgage rate from the Bank of Canada (on by default; falls back
      # to baked-in regional rates if offline). Set to "off" to disable.
      - EVALUATOR_LIVE_DATA=${EVALUATOR_LIVE_DATA:-on}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
