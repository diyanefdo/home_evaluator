services:
  home-evaluator:
    build: .
    image: home-evaluator
    container_name: home-evaluator
    ports:
      - "8000:8000"          # host:container — see WSL note in knowledge/DOCKER_PRIVATE_DEPLOYMENT.md
    environment:
      # Set these in a local .env file (gitignored) to require login on a public link.
      # EVALUATOR_AUTH toggles login: on/off, or leave empty for "auto"
      #   (auto = login is ON whenever EVALUATOR_PASSWORD is set, OFF otherwise).
      - EVALUATOR_AUTH=${EVALUATOR_AUTH:-}
      - EVALUATOR_USER=${EVALUATOR_USER:-admin}
      - EVALUATOR_PASSWORD=${EVALUATOR_PASSWORD:-}
      # Live 5yr mortgage rate from the Bank of Canada (on by default; falls back
      # to baked-in regional rates if offline). Set to "off" to disable.
      - EVALUATOR_LIVE_DATA=${EVALUATOR_LIVE_DATA:-on}
      # --- Phase 2: accounts (Postgres + Google OAuth) --------------------------
      # Persistence: points at the `db` service below. Accounts stay OFF until the
      # Google client credentials are also provided.
      - EVALUATOR_DB=${EVALUATOR_DB:-postgresql+psycopg://eval:${POSTGRES_PASSWORD:-evalpass}@db:5432/evaluator}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - EVALUATOR_SECRET_KEY=${EVALUATOR_SECRET_KEY:-}
      - EVALUATOR_OAUTH_REDIRECT=${EVALUATOR_OAUTH_REDIRECT:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16
    container_name: home-evaluator-db
    environment:
      - POSTGRES_USER=eval
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-evalpass}
      - POSTGRES_DB=evaluator
    volumes:
      - evaluator-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eval -d evaluator"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  evaluator-pgdata:
